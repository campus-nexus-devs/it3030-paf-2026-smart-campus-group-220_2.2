spring.application.name=it3030-paf-2026-smart-campus
# HTTP Basic user for resource create/update/delete (must match app-settings.js RESOURCE_ADMIN_BASIC_* )
app.resource-admin.username=admin
app.resource-admin.password=123456
# Special-case admin from login.html (not stored in app_users); shown in admin user list as id 0
app.portal-admin.email=admin@gmail.com
app.portal-admin.full-name=System Admin
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:smart_campus}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
server.tomcat.max-http-post-size=16MB
server.tomcat.max-http-form-post-size=16MB
